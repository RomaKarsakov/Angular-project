<div id="body">
  <h1>Избранное</h1>
  @if(catService.getFavorites().length === 0){<p>У Вас пока нет избранных картинок.<p>}
  @else {
    <div id="cats-grid">
      <app-cat-card
        *ngFor="let cat of catService.getFavorites()"
        [cat]="cat"
      ></app-cat-card>
    </div>
  }

</div>
